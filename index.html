<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>real-time image collage</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; -webkit-user-select: none; }
        
        /* 라이브 카메라 미리보기 */
        #video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        
        /* 콜라주 캔버스 */
        #mainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; touch-action: none; background: transparent; }

        /* 하단 컨트롤 */
        .controls { 
            position: fixed; bottom: 50px; width: 100%; 
            z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; 
        }
        
        /* 도구 전환 및 액션 버튼 */
        .btn-group { display: flex; gap: 12px; }
        
        .btn { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(20px);
            font-size: 13px; font-weight: 700; color: #fff; cursor: pointer;
            letter-spacing: 0.1em; transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        
        /* 모드 전환 버튼 강조 */
        #toggleBtn { background: rgba(255, 255, 255, 0.15); border-color: #fff; min-width: 100px; }
        
        .btn-save { background: #fff; color: #000; border: none; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="mainCanvas"></canvas>

    <div class="controls">
        <div class="btn-group">
            <button class="btn" onclick="clearCanvas()">RESET</button>
            <button id="toggleBtn" class="btn" onclick="toggleTool()">ERASER</button>
            <button class="btn btn-save" onclick="saveImage()">SAVE</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');

        const W = 1206;
        const H = 2622;
        let isDrawing = false;
        let isEraserMode = false;
        let brushSize = 90;

        async function init() {
            canvas.width = W;
            canvas.height = H;
            offCanvas.width = W;
            offCanvas.height = H;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: H }, height: { ideal: W } },
                    audio: false
                });
                video.srcObject = stream;
                video.play();
            } catch (err) {
                alert("카메라 권한을 허용해주세요.");
            }
        }

        // 도구 전환 함수
        function toggleTool() {
            isEraserMode = !isEraserMode;
            const btn = document.getElementById('toggleBtn');
            // 브러쉬 상태면 버튼은 'ERASER'를 보여줌, 지우개 상태면 'BRUSH'를 보여줌
            btn.innerText = isEraserMode ? 'BRUSH' : 'ERASER';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const client = e.touches ? e.touches[0] : e;
            return {
                x: (client.clientX - rect.left) * (W / rect.width),
                y: (client.clientY - rect.top) * (H / rect.height)
            };
        }

        function scrub(e) {
            if (!isDrawing) return;
            const pos = getPos(e);

            if (!isEraserMode) {
                // 브러쉬 모드: 카메라 캡처
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                const scale = Math.max(W / vW, H / vH);
                const drawW = vW * scale;
                const drawH = vH * scale;

                offCtx.clearRect(0, 0, W, H);
                offCtx.drawImage(video, (W - drawW) / 2, (H - drawH) / 2, drawW, drawH);

                offCtx.globalCompositeOperation = 'destination-in';
                const grad = offCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, brushSize);
                grad.addColorStop(0, 'rgba(0,0,0,1)');
                grad.addColorStop(0.6, 'rgba(0,0,0,0.5)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                offCtx.fillStyle = grad;
                offCtx.beginPath();
                offCtx.arc(pos.x, pos.y, brushSize, 0, Math.PI * 2);
                offCtx.fill();

                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(offCanvas, 0, 0);
            } else {
                // 지우개 모드: 투명하게 지우기
                ctx.save();
                ctx.globalCompositeOperation = 'destination-out';
                const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, brushSize);
                grad.addColorStop(0, 'rgba(0,0,0,1)');
                grad.addColorStop(0.6, 'rgba(0,0,0,0.5)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, brushSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; scrub(e); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', scrub);

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scrub(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scrub(e); }, { passive: false });

        function clearCanvas() { ctx.clearRect(0, 0, W, H); }

        function saveImage() {
            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = W; saveCanvas.height = H;
            const sCtx = saveCanvas.getContext('2d');
            sCtx.fillStyle = "#fff";
            sCtx.fillRect(0, 0, W, H);
            sCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = `real-timeimagecollage-${Date.now()}.png`;
            link.href = saveCanvas.toDataURL('image/png');
            link.click();
        }

        init();
    </script>
</body>
</html>
