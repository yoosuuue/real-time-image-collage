<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>shuroop.web</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* 미리보기 카메라 */
        #video { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: cover; z-index: 1; 
        }

        /* 콜라주 캔버스 */
        #mainCanvas { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            z-index: 2; touch-action: none; 
            background: transparent;
        }

        .ui-layer { 
            position: fixed; bottom: 40px; width: 100%; 
            z-index: 10; display: flex; justify-content: center; gap: 15px; 
        }
        .btn { 
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 14px 28px; border-radius: 50px; backdrop-filter: blur(20px);
            font-size: 14px; font-weight: 600; color: #fff; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-save { background: #fff; color: #000; border: none; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="mainCanvas"></canvas>

    <div class="ui-layer">
        <button class="btn" onclick="clearCanvas()">RESET</button>
        <button class="btn btn-save" onclick="saveImage()">SAVE</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });

        // 오프스크린 캔버스로 브러시 정밀도 향상
        const offCanvas = document.createElement('canvas');
        const offCtx = offCanvas.getContext('2d');

        const W = 1206;
        const H = 2622;
        let isDrawing = false;
        let brushSize = 90;

        async function init() {
            canvas.width = W;
            canvas.height = H;
            offCanvas.width = W;
            offCanvas.height = H;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: H }, height: { ideal: W } },
                    audio: false
                });
                video.srcObject = stream;
                video.play();
            } catch (err) {
                alert("카메라 권한이 필요합니다.");
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const client = e.touches ? e.touches[0] : e;
            // 캔버스 좌표 매핑 정밀도 강화
            return {
                x: (client.clientX - rect.left) * (W / rect.width),
                y: (client.clientY - rect.top) * (H / rect.height)
            };
        }

        function scrub(e) {
            if (!isDrawing) return;
            const pos = getPos(e);

            // 1. 오프스크린에 카메라 프레임 그리기 (cover 비율 정밀 계산)
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            const scale = Math.max(W / vW, H / vH);
            const drawW = vW * scale;
            const drawH = vH * scale;
            const dx = (W - drawW) / 2;
            const dy = (H - drawH) / 2;

            offCtx.clearRect(0, 0, W, H);
            offCtx.drawImage(video, dx, dy, drawW, drawH);

            // 2. 부드러운 브러시 마스킹
            offCtx.globalCompositeOperation = 'destination-in';
            const grad = offCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, brushSize);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(0.6, 'rgba(0,0,0,0.5)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            
            offCtx.fillStyle = grad;
            offCtx.beginPath();
            offCtx.arc(pos.x, pos.y, brushSize, 0, Math.PI * 2);
            offCtx.fill();

            // 3. 메인 캔버스에 조각 얹기
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(offCanvas, 0, 0);
        }

        // 이벤트 리스너
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; scrub(e); });
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', scrub);

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scrub(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scrub(e); }, { passive: false });

        // 리셋해도 카메라가 멈추지 않게 픽셀만 삭제
        function clearCanvas() {
            ctx.clearRect(0, 0, W, H);
        }

        function saveImage() {
            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = W; saveCanvas.height = H;
            const sCtx = saveCanvas.getContext('2d');
            sCtx.fillStyle = "#fff"; // 저장 시엔 배경을 흰색으로
            sCtx.fillRect(0, 0, W, H);
            sCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = `shuroop-${Date.now()}.png`;
            link.href = saveCanvas.toDataURL('image/png');
            link.click();
        }

        init();
    </script>
</body>
</html>
